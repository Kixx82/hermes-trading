<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes Trading Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh}
.header{background:#161b22;border-bottom:1px solid #30363d;padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;font-weight:600}
.header .status-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:12px;font-size:13px;font-weight:500}
.status-running{background:#1a3a2a;color:#3fb950;border:1px solid #2ea043}
.status-paused{background:#3a2f1a;color:#d29922;border:1px solid #bb8009}
.status-stopped{background:#3a1a1a;color:#f85149;border:1px solid #da3633}
.container{max-width:1440px;margin:0 auto;padding:20px 24px}
.grid{display:grid;gap:16px}
.grid-2{grid-template-columns:1fr 1fr}
.grid-3{grid-template-columns:1fr 1fr 1fr}
.grid-4{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:900px){.grid-2,.grid-3,.grid-4{grid-template-columns:1fr}}
.card{background:#161b22;border:1px solid #30363d;border-radius:8px;padding:16px}
.card h2{font-size:14px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.metric-value{font-size:28px;font-weight:700;line-height:1.2}
.metric-label{font-size:12px;color:#8b949e;margin-top:2px}
.metric-green{color:#3fb950}
.metric-red{color:#f85149}
.metric-neutral{color:#e6edf3}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:6px;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:all .15s}
.btn-primary{background:#238636;color:#fff}.btn-primary:hover{background:#2ea043}
.btn-danger{background:#da3633;color:#fff}.btn-danger:hover{background:#f85149}
.btn-warning{background:#9e6a03;color:#fff}.btn-warning:hover{background:#bb8009}
.btn-outline{background:transparent;color:#e6edf3;border:1px solid #30363d}.btn-outline:hover{background:#30363d}
.btn-sm{padding:4px 10px;font-size:12px}
.controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
select,input{background:#0d1117;color:#e6edf3;border:1px solid #30363d;border-radius:6px;padding:6px 10px;font-size:13px}
select:focus,input:focus{outline:none;border-color:#58a6ff}
.config-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap}
.config-row label{font-size:13px;color:#8b949e;min-width:100px}
.chart-container{position:relative;height:350px}
#chart{height:350px!important}
.trades-table{width:100%;border-collapse:collapse;font-size:13px}
.trades-table th{text-align:left;padding:8px 6px;border-bottom:1px solid #30363d;color:#8b949e;font-weight:500}
.trades-table td{padding:6px;border-bottom:1px solid #21262d}
.trades-table tr:hover{background:#1c2128}
.log-area{background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:8px;height:300px;overflow-y:auto;font-family:'SF Mono','Fira Code',monospace;font-size:12px;line-height:1.6}
.log-entry{display:flex;gap:8px;padding:2px 0}
.log-time{color:#8b949e;white-space:nowrap}
.log-level{font-weight:600;min-width:40px}
.log-INFO{color:#8b949e}.log-BUY{color:#3fb950}.log-SELL{color:#f85149}.log-ERROR{color:#f85149;background:#3a1a1a}
.symbol-grid{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.symbol-btn{padding:6px 14px;border-radius:6px;border:1px solid #30363d;background:transparent;color:#e6edf3;cursor:pointer;font-size:13px;transition:all .15s}
.symbol-btn:hover{border-color:#58a6ff}
.symbol-btn.active{background:#1f6feb;border-color:#1f6feb;color:#fff}
.refresh-indicator{font-size:12px;color:#8b949e}
.loading{text-align:center;padding:40px;color:#8b949e}
</style>
</head>
<body>

<div class="header">
  <h1>Hermes Trading Bot</h1>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="refresh-indicator" id="refreshIndicator">live</span>
    <span class="status-badge status-stopped" id="statusBadge">stopped</span>
  </div>
</div>

<div class="container">

  <!-- Controls -->
  <div class="card" style="margin-bottom:16px">
    <div class="controls">
      <button class="btn btn-primary" id="btnStart">Start</button>
      <button class="btn btn-warning" id="btnPause" disabled>Pause</button>
      <button class="btn btn-danger" id="btnStop" disabled>Stop</button>
    </div>
  </div>

  <!-- Metrics -->
  <div class="grid grid-4" style="margin-bottom:16px">
    <div class="card"><div class="metric-label">Price</div><div class="metric-value metric-neutral" id="metricPrice">--</div></div>
    <div class="card"><div class="metric-label">Fast MA</div><div class="metric-value metric-neutral" id="metricFast">--</div></div>
    <div class="card"><div class="metric-label">Slow MA</div><div class="metric-value metric-neutral" id="metricSlow">--</div></div>
    <div class="card"><div class="metric-label">Position</div><div class="metric-value" id="metricPosition" style="font-size:22px">none</div></div>
    <div class="card"><div class="metric-label">Total P&L</div><div class="metric-value" id="metricPnl">--</div></div>
    <div class="card"><div class="metric-label">Win Rate</div><div class="metric-value" id="metricWinRate">--</div></div>
    <div class="card"><div class="metric-label">Trades</div><div class="metric-value" id="metricTrades">0</div></div>
    <div class="card"><div class="metric-label">Best / Worst</div><div class="metric-value" style="font-size:20px" id="metricBestWorst">--</div></div>
  </div>

  <!-- Chart + Config -->
  <div class="grid grid-2" style="margin-bottom:16px">
    <div class="card">
      <h2>Price Chart</h2>
      <div class="chart-container"><canvas id="chart"></canvas></div>
    </div>
    <div class="card">
      <h2>Configuration</h2>

      <div class="config-row">
        <label>Market</label>
        <div class="symbol-grid" id="symbolGrid"></div>
      </div>

      <div class="config-row">
        <label>Timeframe</label>
        <select id="selTimeframe">
          <option value="5m">5 min</option>
          <option value="15m">15 min</option>
          <option value="1h" selected>1 hour</option>
          <option value="4h">4 hours</option>
          <option value="1d">1 day</option>
        </select>
      </div>

      <div class="config-row">
        <label>Fast MA</label>
        <input type="number" id="inpFast" value="9" min="2" max="100" style="width:70px">
      </div>

      <div class="config-row">
        <label>Slow MA</label>
        <input type="number" id="inpSlow" value="21" min="5" max="200" style="width:70px">
      </div>

      <div class="config-row">
        <label>Position Size</label>
        <input type="number" id="inpSize" value="10" min="1" max="100" style="width:70px"> <span style="color:#8b949e;font-size:13px">%</span>
      </div>

      <div class="config-row">
        <label>Stop Loss</label>
        <input type="number" id="inpStopLoss" value="3" min="0.5" max="50" step="0.5" style="width:70px"> <span style="color:#8b949e;font-size:13px">%</span>
      </div>

      <div class="config-row">
        <label>Take Profit</label>
        <input type="number" id="inpTP" value="6" min="1" max="100" step="0.5" style="width:70px"> <span style="color:#8b949e;font-size:13px">%</span>
      </div>

      <button class="btn btn-primary btn-sm" id="btnApplyConfig" style="margin-top:8px">Apply Config</button>
    </div>
  </div>

  <!-- Trades + Logs -->
  <div class="grid grid-2">
    <div class="card">
      <h2>Trade History</h2>
      <div style="max-height:350px;overflow-y:auto">
        <table class="trades-table">
          <thead><tr><th>Time</th><th>Action</th><th>Price</th><th>Size</th><th>P&L</th></tr></thead>
          <tbody id="tradeBody"></tbody>
        </table>
      </div>
      <div id="noTrades" class="loading" style="display:none">No trades yet</div>
    </div>
    <div class="card">
      <h2>Logs</h2>
      <div class="log-area" id="logArea"><div class="loading">Waiting for logs...</div></div>
    </div>
  </div>
</div>

<script>
// State
let chart = null;
let statusData = { running: false, paused: false };
let lastPricePoints = [];

// Init
document.addEventListener('DOMContentLoaded', () => {
  initChart();
  loadMarkets();
  loadStatus();
  loadLogs();
  loadTrades();

  // Auto-refresh
  setInterval(loadStatus, 5000);
  setInterval(loadLogs, 5000);
  setInterval(loadTrades, 10000);

  // Event handlers
  document.getElementById('btnStart').onclick = startBot;
  document.getElementById('btnStop').onclick = stopBot;
  document.getElementById('btnPause').onclick = pauseBot;
  document.getElementById('btnApplyConfig').onclick = applyConfig;
});

function initChart() {
  const ctx = document.getElementById('chart').getContext('2d');
  chart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [
        { label: 'Price', data: [], borderColor: '#58a6ff', borderWidth: 2, pointRadius: 0, tension: 0.2 },
        { label: 'Fast MA', data: [], borderColor: '#3fb950', borderWidth: 1.5, pointRadius: 0, tension: 0.2 },
        { label: 'Slow MA', data: [], borderColor: '#d29922', borderWidth: 1.5, pointRadius: 0, tension: 0.2 },
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      backgroundColor: '#0d1117',
      plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
      scales: {
        x: { ticks: { color: '#8b949e', maxTicksLimit: 10, font: { size: 10 } }, grid: { color: '#21262d' } },
        y: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } }
      },
      interaction: { intersect: false, mode: 'index' }
    }
  });
}

function updateChart(points) {
  if (!chart || !points || points.length === 0) return;
  lastPricePoints = points;
  chart.data.labels = points.map(p => {
    const d = new Date(p.ts);
    return d.toLocaleTimeString();
  });
  chart.data.datasets[0].data = points.map(p => p.price);
  chart.data.datasets[1].data = points.map(p => p.fast);
  chart.data.datasets[2].data = points.map(p => p.slow);
  chart.update('none');
}

// ---- API calls ----

async function api(url, opts = {}) {
  try {
    const r = await fetch(url, { headers: { 'Accept': 'application/json' }, ...opts });
    return await r.json();
  } catch(e) {
    console.error('API error:', e);
    return null;
  }
}

async function loadStatus() {
  const d = await api('/api/status');
  if (!d) return;
  statusData = d;

  // Badge
  const badge = document.getElementById('statusBadge');
  if (d.running && !d.paused) {
    badge.className = 'status-badge status-running';
    badge.textContent = 'running';
  } else if (d.running && d.paused) {
    badge.className = 'status-badge status-paused';
    badge.textContent = 'paused';
  } else {
    badge.className = 'status-badge status-stopped';
    badge.textContent = 'stopped';
  }

  // Buttons
  document.getElementById('btnStart').disabled = d.running;
  document.getElementById('btnStop').disabled = !d.running;
  document.getElementById('btnPause').disabled = !d.running;
  document.getElementById('btnPause').textContent = d.paused ? 'Resume' : 'Pause';

  // Config
  if (d.config) {
    document.getElementById('selTimeframe').value = d.config.timeframe || '1h';
    document.getElementById('inpFast').value = d.config.fast_period || 9;
    document.getElementById('inpSlow').value = d.config.slow_period || 21;
    document.getElementById('inpSize').value = Math.round((d.config.position_size_pct || 0.1) * 100);
    document.getElementById('inpStopLoss').value = Math.round((d.config.stop_loss_pct || 0.03) * 100);
    document.getElementById('inpTP').value = Math.round((d.config.take_profit_pct || 0.06) * 100);
  }

  // Metrics
  if (d.summary) {
    const s = d.summary;
    document.getElementById('metricPnl').textContent = s.total_pnl_pct + '%';
    document.getElementById('metricPnl').className = 'metric-value ' + (s.total_pnl_pct >= 0 ? 'metric-green' : 'metric-red');
    document.getElementById('metricWinRate').textContent = s.win_rate + '%';
    document.getElementById('metricTrades').textContent = s.total_trades;
    document.getElementById('metricBestWorst').textContent = s.best_trade_pct + '% / ' + s.worst_trade_pct + '%';
  }

  // Position
  const posEl = document.getElementById('metricPosition');
  if (d.position) {
    posEl.textContent = 'LONG @ ' + d.position.entry.toFixed(0);
    posEl.className = 'metric-value metric-green';
  } else {
    posEl.textContent = 'none';
    posEl.className = 'metric-value metric-neutral';
  }

  // Update chart from price history
  const ph = await api('/api/price-history?limit=200');
  if (ph && ph.points && ph.points.length > 0) {
    const last = ph.points[ph.points.length - 1];
    document.getElementById('metricPrice').textContent = last.price.toFixed(2);
    document.getElementById('metricFast').textContent = last.fast.toFixed(2);
    document.getElementById('metricSlow').textContent = last.slow.toFixed(2);
    updateChart(ph.points);
  }

  // Refresh indicator
  document.getElementById('refreshIndicator').textContent = new Date().toLocaleTimeString();
}

async function loadMarkets() {
  const d = await api('/api/markets');
  if (!d) return;
  const grid = document.getElementById('symbolGrid');
  grid.innerHTML = '';
  d.markets.forEach(m => {
    const btn = document.createElement('button');
    btn.className = 'symbol-btn' + (m.id === d.current ? ' active' : '');
    btn.textContent = m.label;
    btn.dataset.symbol = m.id;
    btn.onclick = () => switchSymbol(m.id, btn);
    grid.appendChild(btn);
  });
}

async function switchSymbol(sym, btn) {
  await api('/api/config', {
    method: 'POST',
    body: JSON.stringify({ symbol: sym }),
    headers: { 'Content-Type': 'application/json' }
  });
  document.querySelectorAll('.symbol-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

async function startBot() {
  const r = await api('/api/bot/start', { method: 'POST' });
  if (r) loadStatus();
}

async function stopBot() {
  const r = await api('/api/bot/stop', { method: 'POST' });
  if (r) loadStatus();
}

async function pauseBot() {
  const btn = document.getElementById('btnPause');
  const method = statusData.paused ? 'resume' : 'pause';
  const r = await api('/api/bot/' + method, { method: 'POST' });
  if (r) loadStatus();
}

async function applyConfig() {
  const cfg = {
    timeframe: document.getElementById('selTimeframe').value,
    fast_period: parseInt(document.getElementById('inpFast').value),
    slow_period: parseInt(document.getElementById('inpSlow').value),
    position_size_pct: parseInt(document.getElementById('inpSize').value) / 100,
    stop_loss_pct: parseInt(document.getElementById('inpStopLoss').value) / 100,
    take_profit_pct: parseInt(document.getElementById('inpTP').value) / 100,
  };
  await api('/api/config', {
    method: 'POST',
    body: JSON.stringify(cfg),
    headers: { 'Content-Type': 'application/json' }
  });
}

async function loadLogs() {
  const d = await api('/api/logs?limit=100');
  if (!d || !d.logs || d.logs.length === 0) return;
  const area = document.getElementById('logArea');
  area.innerHTML = d.logs.reverse().map(l => {
    const t = new Date(l.ts).toLocaleTimeString();
    return `<div class="log-entry"><span class="log-time">${t}</span><span class="log-level log-${l.level}">${l.level}</span><span>${l.msg}</span></div>`;
  }).join('');
  area.scrollTop = area.scrollHeight;
}

async function loadTrades() {
  const d = await api('/api/trades');
  if (!d) return;
  const body = document.getElementById('tradeBody');
  const noTrades = document.getElementById('noTrades');
  if (d.count === 0) {
    body.innerHTML = '';
    noTrades.style.display = 'block';
    return;
  }
  noTrades.style.display = 'none';
  body.innerHTML = d.trades.slice().reverse().map(t => {
    const pnl = t.pnl !== null && t.pnl !== undefined ? t.pnl : '';
    const pnlClass = pnl !== '' ? (pnl >= 0 ? 'metric-green' : 'metric-red') : '';
    const time = new Date(t.ts).toLocaleString();
    return `<tr><td>${time}</td><td><strong>${t.action.toUpperCase()}</strong></td><td>${t.price.toFixed(2)}</td><td>${(t.size*100).toFixed(1)}%</td><td class="${pnlClass}">${pnl !== '' ? (pnl*100).toFixed(2)+'%' : '-'}</td></tr>`;
  }).join('');
}
</script>
</body>
</html>
